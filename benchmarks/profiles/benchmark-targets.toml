[defaults.target]
recommended_repetitions = 3
matrix_rows = "MATRIX_ROWS"
benchmark_profile = "non_restricted"

[defaults.target.query_profiles.gene_core]
root_class = "Gene"
views = [
  "Gene.primaryIdentifier",
  "Gene.secondaryIdentifier",
  "Gene.symbol",
  "Gene.name",
  "Gene.briefDescription",
  "Gene.organism.name",
  "Gene.organism.taxonId",
]
joins = []

[defaults.target.query_profiles.protein_core]
root_class = "Protein"
views = [
  "Protein.primaryIdentifier",
  "Protein.primaryAccession",
  "Protein.proteinDescription",
  "Protein.length",
  "Protein.molecularWeight",
  "Protein.EC",
  "Protein.symbol",
]
joins = []

[targets.legumemine]
name = "LegumeMine"
endpoint = "https://mines.legumeinfo.org/legumemine/service"
endpoint_fallbacks = ["http://mines.legumeinfo.org/legumemine/service"]
query_profile = "gene_core"
benchmark_profile = "server_restricted"
server_restricted = true

[targets.maizemine]
name = "MaizeMine"
endpoint = "https://maizemine.rnet.missouri.edu/maizemine/service"
endpoint_fallbacks = ["http://maizemine.rnet.missouri.edu:8080/maizemine/service"]
query_profile = "gene_core"
benchmark_profile = "server_restricted"
server_restricted = true

[targets.thalemine]
name = "ThaleMine"
endpoint = "https://bar.utoronto.ca/thalemine/service"
endpoint_fallbacks = ["https://www.bar.utoronto.ca/thalemine/service"]
benchmark_profile = "non_restricted"
server_restricted = false
root_class = "Gene"
views = [
  "Gene.primaryIdentifier",
  "Gene.secondaryIdentifier",
  "Gene.symbol",
  "Gene.name",
  "Gene.briefDescription",
  "Gene.tairShortDescription",
  "Gene.tairCuratorSummary",
]
joins = []

[targets.oakmine]
name = "OakMine"
endpoint = "https://urgi.versailles.inra.fr/OakMine_PM1N/service"
endpoint_fallbacks = ["https://urgi.versailles.inrae.fr/OakMine_PM1N/service"]
query_profile = "protein_core"
benchmark_profile = "non_restricted"
server_restricted = false

[targets.wheatmine]
name = "WheatMine"
endpoint = "https://urgi.versailles.inrae.fr/WheatMine/service"
endpoint_fallbacks = ["https://urgi.versailles.inra.fr/WheatMine/service"]
benchmark_profile = "non_restricted"
server_restricted = false
root_class = "Gene"
views = [
  "Gene.primaryIdentifier",
  "Gene.secondaryIdentifier",
  "Gene.symbol",
  "Gene.name",
  "Gene.length",
  "Gene.score",
  "Gene.scoreType",
  "Gene.organism.name",
  "Gene.organism.taxonId",
]
joins = []
