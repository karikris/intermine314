name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e .[dev]

      - name: Lint (minimal)
        run: ruff check .

  tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e .[dev]

      - name: Import smoke check
        run: |
          python -c "import intermine314"
          python -c "import intermine314.parallel"
          python -c "import intermine314.parallel.policy"

      - name: Unit tests
        run: |
          mkdir -p test-results
          pytest -q --junitxml=test-results/junit.xml

      - name: Phase0 Baseline Guardrails
        if: matrix.python-version == '3.12'
        run: |
          mkdir -p test-results/benchmarks
          python benchmarks/runners/phase0_guardrails.py \
            --import-repetitions 3 \
            --json-out test-results/benchmarks/phase0-guardrails.json

          set +e
          python benchmarks/runners/phase0_ci_fixed_fetch.py \
            --rows-target 2000 \
            --page-size 1000 \
            --workers 2 \
            --query-views Gene.primaryIdentifier \
            --preflight-timeout-seconds 8 \
            --json-out test-results/benchmarks/phase0-fixed-benchmark.json
          baseline_rc=$?
          set -e

          if [ "${baseline_rc}" -eq 1 ]; then
            echo "phase0 fixed benchmark failed with rc=1"
            exit 1
          fi
          if [ "${baseline_rc}" -ne 0 ] && [ "${baseline_rc}" -ne 2 ]; then
            echo "phase0 fixed benchmark failed with unexpected rc=${baseline_rc}"
            exit "${baseline_rc}"
          fi
          echo "${baseline_rc}" > test-results/benchmarks/phase0-fixed-benchmark.exit-code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: test-results/junit.xml
          if-no-files-found: warn

      - name: Upload benchmark guardrail artifacts
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: phase0-guardrails-py${{ matrix.python-version }}
          path: test-results/benchmarks
          if-no-files-found: warn
