name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e .[dev]

      - name: Lint (minimal)
        run: ruff check .

  tests:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e .[dev]

      - name: Import smoke check
        run: |
          python -c "import intermine314"
          python -c "import intermine314.parallel"
          python -c "import intermine314.parallel.policy"

      - name: Unit tests
        run: |
          mkdir -p test-results
          pytest --collect-only -q > test-results/collect.txt
          INTERMINE314_TEST_DISABLE_NETWORK=1 pytest -q --junitxml=test-results/junit.xml

      - name: Test inventory baseline summary
        if: always()
        run: |
          python scripts/test_inventory_summary.py \
            --collect-out test-results/collect.txt \
            --junit-xml test-results/junit.xml \
            --json-out test-results/test-inventory.json \
            --md-out test-results/test-inventory.md

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-py3.14
          path: test-results/
          if-no-files-found: warn
