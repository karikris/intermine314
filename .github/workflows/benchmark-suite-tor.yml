name: Benchmark Suite Tor Variant

on:
  workflow_dispatch:
    inputs:
      mine_url:
        description: "Mine URL root for live benchmark scenario (without /service)"
        required: false
        default: "https://bar.utoronto.ca/thalemine"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  benchmark_tor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -e .[dev,benchmark]

      - name: Install Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor

      - name: Start Tor SOCKS proxy
        run: |
          mkdir -p /tmp/tor-data
          tor --RunAsDaemon 1 --SocksPort 9050 --DataDirectory /tmp/tor-data
          sleep 3
          ss -ltn | grep ":9050"

      - name: Run benchmark suite tests (explicit benchmark track)
        run: |
          mkdir -p benchmark-results
          INTERMINE314_RUN_BENCHMARK_TESTS=1 \
          INTERMINE314_TEST_DISABLE_NETWORK=1 \
          pytest -q tests/test_benchmarking_* \
            --junitxml=benchmark-results/benchmark-suite-tests-junit.xml

      - name: Run phase-0 startup/import guardrails
        run: |
          PYTHONPATH=src \
          python -m benchmarks.runners.phase0_guardrails \
            --json-out benchmark-results/phase0_guardrails.json

      - name: Run throughput and memory-envelope baseline runners
        run: |
          PYTHONPATH=src \
          python -m benchmarks.runners.phase0_parallel_baselines \
            --rows-target 50000 \
            --curve-rows-target 5000 \
            --throughput-workers 1,2,4,8 \
            --memory-envelope-bytes 16777216,33554432,67108864,134217728 \
            --json-out benchmark-results/phase0_parallel_baselines.json

      - name: Run explicit storage/engine benchmark scenario with Tor variant
        env:
          DEFAULT_BENCHMARK_MINE_URL: https://bar.utoronto.ca/thalemine
          INTERMINE314_BENCHMARK_TOR_PROXY_URL: socks5h://127.0.0.1:9050
        run: |
          MINE_URL="${{ github.event.inputs.mine_url || env.DEFAULT_BENCHMARK_MINE_URL }}"
          PYTHONPATH=src \
          python -m benchmarks.benchmarks \
            --mine-url "${MINE_URL}" \
            --baseline-rows 5000 \
            --parallel-rows 5000 \
            --repetitions 1 \
            --dataframe-repetitions 1 \
            --matrix-six \
            --matrix-rows 5000,10000,25000,50000,100000 \
            --matrix-storage-compare \
            --matrix-load-repetitions 1 \
            --batch-size-test \
            --batch-size-test-rows 10000 \
            --batch-size-test-chunk-rows 1000,2500,5000,7500,10000 \
            --workers auto \
            --transport-modes direct,tor \
            --tor-proxy-url socks5h://127.0.0.1:9050 \
            --no-oakmine-targeted-exports \
            --json-out benchmark-results/benchmark_suite_tor_variant.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-suite-tor-variant
          path: benchmark-results/
          if-no-files-found: warn
