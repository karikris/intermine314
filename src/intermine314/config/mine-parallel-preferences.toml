[production_profiles.elt_default_w4]
workflow = "elt"
workers = 4
pipeline = "parquet_duckdb"
parallel_profile = "large_query"
ordered = "unordered"
large_query_mode = true

[production_profiles.elt_server_limited_w8]
workflow = "elt"
workers = 8
pipeline = "parquet_duckdb"
parallel_profile = "large_query"
ordered = "unordered"
large_query_mode = true

[production_profiles.elt_full_w16]
workflow = "elt"
workers = 16
pipeline = "parquet_duckdb"
parallel_profile = "large_query"
ordered = "unordered"
large_query_mode = true

[defaults.mine]
default_workers = 16
large_query_threshold_rows = 50000
workers_above_threshold = 16
workers_when_size_unknown = 16
production_profile_switch_rows = 50000
production_elt_small_profile = "elt_full_w16"
production_elt_large_profile = "elt_full_w16"
production_elt_small_resource_profile = "default"
production_elt_large_resource_profile = "default"

[mines.legumemine]
display_name = "LegumeMine"
host_patterns = ["mines.legumeinfo.org"]
path_prefixes = ["/legumemine"]
default_workers = 4
workers_above_threshold = 4
workers_when_size_unknown = 4
production_elt_small_profile = "elt_default_w4"
production_elt_large_profile = "elt_default_w4"

[mines.maizemine]
display_name = "MaizeMine"
host_patterns = ["maizemine.rnet.missouri.edu"]
path_prefixes = ["/maizemine"]
default_workers = 8
workers_above_threshold = 8
workers_when_size_unknown = 8
production_elt_small_profile = "elt_server_limited_w8"
production_elt_large_profile = "elt_server_limited_w8"

[mines.thalemine]
display_name = "ThaleMine"
host_patterns = ["bar.utoronto.ca"]
path_prefixes = ["/thalemine"]
user_agent = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"

[mines.oakmine]
display_name = "OakMine"
host_patterns = ["urgi.versailles.inra.fr", "urgi.versailles.inrae.fr"]
path_prefixes = ["/OakMine_PM1N"]

[mines.wheatmine]
display_name = "WheatMine"
host_patterns = ["urgi.versailles.inra.fr", "urgi.versailles.inrae.fr"]
path_prefixes = ["/WheatMine"]
